# ─────────────────────────────────────────────────
# Gale — Configuration
# ─────────────────────────────────────────────────
# All values shown are defaults. This file is
# optional — Gale works out of the box without it.
# Environment variables override file values:
#   GALE_PORT=8080, GALE_ROOT=./public, etc.
#
# Paths: use forward slashes on all platforms.
#   root = "./public" works on Linux, macOS, and Windows.
# ─────────────────────────────────────────────────

[server]
bind = "0.0.0.0"
port = 8080
root = "./public"
index = "index.html"
error_page_404 = ""           # Path to custom 404.html (empty = built-in)
health_endpoint = "/health"   # Health check path (empty = disabled)
shutdown_timeout_secs = 10    # Seconds to drain connections on shutdown

[tls]
enabled = false
cert = ""                     # /path/to/fullchain.pem (static cert mode)
key = ""                      # /path/to/privkey.pem (static cert mode)
redirect_port = 80            # HTTP->HTTPS redirect port (0 = disabled)
acme = false                  # Enable automatic Let's Encrypt certificates
acme_email = ""               # Required if acme = true (e.g. admin@example.com)
acme_domain = ""              # Required if acme = true (e.g. example.com)
acme_cache_dir = "./acme_cache"  # Directory for cached certs/account keys
acme_production = false       # false = LE staging (safe for testing), true = LE production

[limits]
max_body_size = 10_485_760    # 10 MB
max_uri_length = 8192         # bytes
max_header_count = 100
max_header_size = 8192        # bytes per header
request_timeout_secs = 30
read_timeout_secs = 10
write_timeout_secs = 10

[rate_limit]
enabled = true
requests_per_second = 100     # Per source IP
max_connections_per_ip = 256
burst = 50                    # Token bucket burst allowance

[cache]
default_max_age = 3600        # 1 hour for HTML/dynamic
immutable_max_age = 31536000  # 1 year for fingerprinted assets
immutable_extensions = [
    "js", "css", "woff2", "woff", "ttf", "eot",
    "png", "jpg", "jpeg", "gif", "svg", "webp", "avif", "ico",
    "mp4", "webm", "ogg",
    "wasm",
]
no_cache_extensions = ["html", "htm"]  # Always revalidate

[compression]
enabled = true
min_size = 1024               # Don't compress below 1 KB
algorithms = ["br", "gzip"]   # Preference order
pre_compressed = true         # Serve .br/.gz sidecars if present
skip_extensions = [           # Already compressed — don't waste CPU
    "png", "jpg", "jpeg", "gif", "webp", "avif",
    "woff2", "woff",
    "mp4", "webm", "ogg",
    "zip", "gz", "br", "zst",
]

[security]
# All headers enabled by default
csp = "default-src 'self'"
hsts_max_age = 31536000       # 1 year (only sent over HTTPS)
hsts_include_subdomains = true
x_content_type_options = true # nosniff
x_frame_options = "DENY"     # DENY | SAMEORIGIN
referrer_policy = "strict-origin-when-cross-origin"
permissions_policy = "camera=(), microphone=(), geolocation=()"
server_header = ""            # Empty = don't send Server header
block_dotfiles = true         # Never serve .git, .env, etc.
                              # On Windows, also blocks files with the hidden attribute

[cors]
enabled = false
allowed_origins = []          # ["https://example.com"]
allowed_methods = ["GET", "HEAD", "OPTIONS"]
allowed_headers = []
max_age = 86400

[logging]
level = "info"                # trace | debug | info | warn | error
format = "clf"                # "clf" (Common Log Format) | "json"
output = "stdout"             # "stdout" | "file"
file_path = ""                # Required if output = "file"
